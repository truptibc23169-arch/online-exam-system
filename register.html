<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Cloud Computing Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body.register-page {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 50%, #56ab2f 100%);
            position: relative;
            overflow: hidden;
        }
        
        body.register-page::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }
        
        body.register-page::after {
            content: '';
            position: absolute;
            bottom: -50%;
            left: -10%;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            animation: float 8s ease-in-out infinite 2s;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body class="register-page">

<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center" style="position: relative; z-index: 1;">
    <div class="card shadow-lg border-0 rounded-4" style="max-width: 400px; width: 100%; backdrop-filter: blur(10px);">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <img src="images/register-form.svg" alt="Register" class="mb-3" style="width: 100px; height: 100px; animation: bounce 2s infinite;">
                <h1 class="display-6 fw-bold text-success mb-3">
                    Register
                </h1>
                <p class="text-muted">Create your Cloud Computing Quiz account</p>
            </div>

            <form>
                <div class="mb-3">
                    <label for="name" class="form-label fw-semibold">Full Name</label>
                    <input type="text" class="form-control form-control-lg" id="name" placeholder="Enter your full name" required>
                    <small class="text-muted d-block mt-1">At least 3 characters, letters only</small>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label fw-semibold">Email Address</label>
                    <input type="email" class="form-control form-control-lg" id="email" placeholder="Enter your email" required>
                    <small class="text-muted d-block mt-1">We'll never share your email</small>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label fw-semibold">Password</label>
                    <input type="password" class="form-control form-control-lg" id="password" placeholder="Create a password" oninput="checkPasswordStrength()" required>
                    <div class="password-strength mt-2">
                        <div class="strength-bar">
                            <div id="strength-indicator" class="strength-level"></div>
                        </div>
                        <small id="strength-text" class="text-muted">Password strength: Weak</small>
                    </div>
                    <small class="text-muted d-block mt-1">Min 6 chars, 1 number, 1 capital letter</small>
                </div>

                <div class="mb-4">
                    <label for="confirm-password" class="form-label fw-semibold">Confirm Password</label>
                    <input type="password" class="form-control form-control-lg" id="confirm-password" placeholder="Confirm your password" required>
                </div>

                <div class="d-grid">
                    <button type="button" onclick="register()" class="btn btn-success btn-lg fw-semibold" style="border-radius: 25px; padding: 12px 30px;">
                        <i class="fas fa-user-plus me-2"></i>Create Account
                    </button>
                </div>
            </form>

            <div class="text-center mt-4">
                <p class="mb-0 text-muted">Already have an account?
                    <a href="login.html" class="text-success fw-semibold text-decoration-none">Login here</a>
                </p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
<script>
function checkPasswordStrength() {
    const password = document.getElementById("password").value;
    const strengthIndicator = document.getElementById("strength-indicator");
    const strengthText = document.getElementById("strength-text");
    
    let strength = 0;
    
    if (password.length >= 6) strength++;
    if (/\d/.test(password)) strength++;
    if (/[A-Z]/.test(password)) strength++;
    if (/[a-z]/.test(password)) strength++;
    if (/[!@#$%^&*]/.test(password)) strength++;
    
    strengthIndicator.style.width = (strength * 20) + "%";
    
    if (strength < 2) {
        strengthIndicator.style.backgroundColor = "#ff4757";
        strengthText.textContent = "Password strength: Weak";
        strengthText.className = "text-danger d-block mt-1";
    } else if (strength < 3) {
        strengthIndicator.style.backgroundColor = "#ffa502";
        strengthText.textContent = "Password strength: Fair";
        strengthText.className = "text-warning d-block mt-1";
    } else if (strength < 4) {
        strengthIndicator.style.backgroundColor = "#ffd93d";
        strengthText.textContent = "Password strength: Good";
        strengthText.className = "text-info d-block mt-1";
    } else {
        strengthIndicator.style.backgroundColor = "#6bcf7f";
        strengthText.textContent = "Password strength: Strong";
        strengthText.className = "text-success d-block mt-1";
    }
}
</script>
<script src="auth.js"></script>
</body>
</html>
