<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="register-page">

<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow" style="width:400px">

    <h2 class="text-center text-success">Register</h2>

    <input id="name" class="form-control mb-2" placeholder="Name">
    <input id="email" class="form-control mb-2" placeholder="Email">
    <input id="password" type="password" class="form-control mb-2" placeholder="Password">
    <input id="confirm-password" type="password" class="form-control mb-3" placeholder="Confirm Password">

    <button onclick="register()" class="btn btn-success w-100">Register</button>

    <p class="text-center mt-3">
      Already have account? <a href="./login.html">Login</a>
    </p>

  </div>
</div>

<script type="module" src="./auth.js"></script>

</body>
</html>
