<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Cloud Computing Quiz</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>
        body.register-page {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 50%, #56ab2f 100%);
            position: relative;
            overflow: hidden;
        }
    </style>
</head>

<body class="register-page">

<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center">
    <div class="card shadow-lg border-0 rounded-4" style="max-width: 400px; width: 100%;">
        <div class="card-body p-5">

            <h2 class="text-center text-success mb-4">Register</h2>

            <input type="text" id="name" class="form-control mb-3" placeholder="Full Name">
            <input type="email" id="email" class="form-control mb-3" placeholder="Email">
            <input type="password" id="password" class="form-control mb-3" placeholder="Password">
            <input type="password" id="confirm-password" class="form-control mb-3" placeholder="Confirm Password">

            <button onclick="register()" class="btn btn-success w-100">Create Account</button>

            <p class="text-center mt-3">
                Already have an account?
                <a href="./login.html">Login</a>
            </p>

        </div>
    </div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCWPbll8-LaU3p2fz-5ry2a9MQvSLZzqXk",
  authDomain: "online-exam-system-e32d6.firebaseapp.com",
  projectId: "online-exam-system-e32d6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// REGISTER FUNCTION
window.register = function () {

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const pass = document.getElementById("password").value;
    const confirm = document.getElementById("confirm-password").value;

    // validation
    if (!name || !email || !pass) {
        alert("Fill all fields");
        return;
    }

    if (pass !== confirm) {
        alert("Passwords do not match");
        return;
    }

    createUserWithEmailAndPassword(auth, email, pass)
        .then(() => {

            // store user locally
            localStorage.setItem("currentUser", JSON.stringify({ name, email }));

            alert("Registered Successfully 🎉");

            // ✅ FIXED REDIRECT (Netlify safe)
            setTimeout(() => {
                window.location.href = "./login.html";
            }, 500);

        })
        .catch((err) => {
            alert(err.message);
        });
};
</script>

</body>
</html>
