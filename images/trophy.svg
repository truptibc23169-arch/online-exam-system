<svg width="80" height="100" viewBox="0 0 80 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="trophyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffed4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f39c12;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="baseGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b4513;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#654321;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Trophy base -->
  <rect x="25" y="75" width="30" height="15" rx="3" fill="url(#baseGradient)" stroke="#654321" stroke-width="1"/>

  <!-- Trophy stem -->
  <rect x="35" y="50" width="10" height="25" fill="url(#trophyGradient)" stroke="#f39c12" stroke-width="1"/>

  <!-- Trophy cup -->
  <ellipse cx="40" cy="35" rx="20" ry="15" fill="url(#trophyGradient)" stroke="#f39c12" stroke-width="2"/>
  <ellipse cx="40" cy="25" rx="15" ry="10" fill="url(#trophyGradient)" stroke="#f39c12" stroke-width="1"/>

  <!-- Trophy handles -->
  <path d="M20,30 Q15,35 20,40" fill="none" stroke="url(#trophyGradient)" stroke-width="3" stroke-linecap="round"/>
  <path d="M60,30 Q65,35 60,40" fill="none" stroke="url(#trophyGradient)" stroke-width="3" stroke-linecap="round"/>

  <!-- Sparkle effects -->
  <circle cx="25" cy="20" r="1.5" fill="#ffffff" opacity="0.8"/>
  <circle cx="55" cy="25" r="1" fill="#ffffff" opacity="0.6"/>
  <circle cx="30" cy="30" r="1" fill="#ffffff" opacity="0.7"/>
  <circle cx="50" cy="35" r="1.5" fill="#ffffff" opacity="0.9"/>
</svg>