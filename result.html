<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gradient-success">

<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center py-5">
    <div class="card shadow-lg border-0 rounded-4" style="max-width: 800px; width: 100%;">
        <div class="card-body p-5">
            <div class="text-center mb-5">
                <div class="celebration-icons mb-3">
                    <img src="images/star.svg" alt="Star" class="star-icon star-1">
                    <img src="images/trophy.svg" alt="Trophy" class="trophy-celebration">
                    <img src="images/star.svg" alt="Star" class="star-icon star-2">
                </div>
                <h1 class="display-4 fw-bold text-success mb-3 animate-fade-in">
                    <i class="fas fa-trophy me-3"></i>Quiz Complete!
                </h1>
                <div class="score-display bg-primary text-white rounded-pill py-3 px-5 d-inline-block animate-bounce-in mb-3">
                    <h2 id="score" class="mb-0 fw-bold"></h2>
                </div>
                <div class="row justify-content-center">
                    <div class="col-auto">
                        <div class="bg-light text-dark rounded-pill py-2 px-4 animate-slide-up">
                            <i class="fas fa-clock me-2"></i>
                            <strong>Time Taken:</strong> <span id="time-taken"></span>
                        </div>
                    </div>
                </div>
            </div>

            <div id="analysis" class="analysis-section"></div>

            <div class="text-center mt-5">
                <button onclick="go()" class="btn btn-success btn-lg px-5 py-3 fw-semibold">
                    <i class="fas fa-home me-2"></i>Back to Dashboard
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
<script>
const score = localStorage.getItem("score");
const userAnswers = JSON.parse(localStorage.getItem("userAnswers"));
const questions = JSON.parse(localStorage.getItem("questions"));
const timeTaken = localStorage.getItem("timeTaken");
const attemptedQuestions = localStorage.getItem("attemptedQuestions");

document.getElementById("score").innerText = `Correct: ${score}/10 | Attempted: ${attemptedQuestions}/10`;

function formatTime(seconds) {
    const mins = Math.floor(seconds / 60);
    const secs = seconds % 60;
    return `${mins}:${secs.toString().padStart(2, '0')}`;
}

document.getElementById("time-taken").innerText = formatTime(timeTaken);

let analysisHtml = '<h3 class="text-center mb-4 fw-bold text-dark"><i class="fas fa-chart-bar me-2"></i>Detailed Analysis</h3>';
questions.forEach((q, i) => {
    const userAns = userAnswers[i] !== undefined ? userAnswers[i] : "Not answered";
    const correct = userAns === q.a;
    analysisHtml += `
        <div class="question-analysis card mb-3 border-0 shadow-sm ${correct ? 'border-success' : 'border-danger'}">
            <div class="card-body">
                <div class="d-flex align-items-center mb-2">
                    <span class="badge ${correct ? 'bg-success' : 'bg-danger'} me-2">${i+1}</span>
                    <h5 class="card-title mb-0 fw-semibold">${q.q}</h5>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <p class="mb-1"><strong class="text-primary">Your Answer:</strong></p>
                        <p class="text-muted">${userAns}</p>
                    </div>
                    <div class="col-md-6">
                        <p class="mb-1"><strong class="text-success">Correct Answer:</strong></p>
                        <p class="text-muted">${q.a}</p>
                    </div>
                </div>
                <div class="text-end">
                    <span class="badge fs-6 ${correct ? 'bg-success' : 'bg-danger'}">
                        <i class="fas ${correct ? 'fa-check' : 'fa-times'} me-1"></i>${correct ? 'Correct' : 'Wrong'}
                    </span>
                </div>
            </div>
        </div>`;
});
document.getElementById("analysis").innerHTML = analysisHtml;

function go(){
    window.location.href="dashboard.html";
}
</script>
</body>
</html>
